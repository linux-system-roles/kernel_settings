---
- name: Ensure that the role runs with default parameters
  hosts: all
  tasks:
    - name: Run test
      block:
        - name: Run role with no settings
          include_tasks: tasks/run_role_with_clear_facts.yml
          vars:
            __sr_public: true

      always:
        - name: Cleanup
          tags:
            - tests::cleanup
          include_tasks: tasks/cleanup.yml
